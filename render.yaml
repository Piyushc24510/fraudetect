services:
  - type: web
    name: fraudetect
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        value: your-random-secret-key
      - key: DATABASE_PATH
        value: /opt/render/project/src/fraud_detection.db
      - key: PYTHON_VERSION
        value: 3.11.0
