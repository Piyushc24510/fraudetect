<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #00ff99;
            --accent-hover: #00cc7a;
            --border-color: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-body); position: relative;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .error-container {
            position: relative; z-index: 1;
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            padding: 60px 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 30px rgba(0, 255, 153, 0.15);
            text-align: center;
        }

        .error-icon {
            font-size: 80px;
            color: var(--accent);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .error-code {
            font-size: 100px;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 255, 153, 0.5);
            margin-bottom: 15px;
            line-height: 1;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 153, 0.4);
        }

        .btn i {
            margin-right: 8px;
        }

        .links {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: var(--accent-hover);
        }

        @media (max-width: 480px) {
            .error-container {
            position: relative; z-index: 1;
                padding: 40px 24px;
            }
            .error-code {
                font-size: 70px;
            }
            h1 {
                font-size: 24px;
            }
            p {
                font-size: 14px;
            }
            .btn {
                padding: 12px 30px;
                font-size: 14px;
            }
            .links a {
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fa fa-exclamation-triangle"></i>
        </div>
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Please check the URL or return to the dashboard.</p>
        
        <a href="/dashboard" class="btn">
            <i class="fa fa-home"></i> Go to Dashboard
        </a>

        <div class="links">
            <a href="/login"><i class="fa fa-sign-in-alt"></i> Login</a>
            <a href="/check"><i class="fa fa-search"></i> Check Review</a>
            <a href="/history"><i class="fa fa-clock"></i> History</a>
        </div>
    </div>

<!-- THREE.JS 3D NEURAL NETWORK BACKGROUND -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<canvas id="bg3d" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
<script>
(function() {
  var canvas = document.getElementById('bg3d');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 80;

  var PARTICLE_COUNT = 160;
  var positions = new Float32Array(PARTICLE_COUNT * 3);
  var velocities = [];
  var nodePos = [];

  for (var i = 0; i < PARTICLE_COUNT; i++) {
    var x = (Math.random() - 0.5) * 200;
    var y = (Math.random() - 0.5) * 160;
    var z = (Math.random() - 0.5) * 80;
    positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
    nodePos.push(new THREE.Vector3(x, y, z));
    velocities.push(new THREE.Vector3(
      (Math.random()-0.5)*0.09,
      (Math.random()-0.5)*0.09,
      (Math.random()-0.5)*0.05
    ));
  }

  var pGeom = new THREE.BufferGeometry();
  pGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  var pMat = new THREE.PointsMaterial({ color: 0x00ff99, size: 1.4, transparent: true, opacity: 0.75, sizeAttenuation: true });
  var points = new THREE.Points(pGeom, pMat);
  scene.add(points);

  var MAX_DIST = 30, MAX_LINES = 280;
  var lp = new Float32Array(MAX_LINES * 6);
  var lGeom = new THREE.BufferGeometry();
  lGeom.setAttribute('position', new THREE.BufferAttribute(lp, 3));
  var lMat = new THREE.LineBasicMaterial({ color: 0x00ff99, transparent: true, opacity: 0.13 });
  scene.add(new THREE.LineSegments(lGeom, lMat));

  var mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', function(e) {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 0.4;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 0.3;
  });
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    var pos = pGeom.attributes.position.array;
    for (var i = 0; i < PARTICLE_COUNT; i++) {
      pos[i*3]   += velocities[i].x;
      pos[i*3+1] += velocities[i].y;
      pos[i*3+2] += velocities[i].z;
      if (Math.abs(pos[i*3])   > 100) velocities[i].x *= -1;
      if (Math.abs(pos[i*3+1]) > 80)  velocities[i].y *= -1;
      if (Math.abs(pos[i*3+2]) > 40)  velocities[i].z *= -1;
      nodePos[i].set(pos[i*3], pos[i*3+1], pos[i*3+2]);
    }
    pGeom.attributes.position.needsUpdate = true;
    var li = 0;
    for (var a = 0; a < PARTICLE_COUNT && li < MAX_LINES; a++) {
      for (var b = a+1; b < PARTICLE_COUNT && li < MAX_LINES; b++) {
        if (nodePos[a].distanceTo(nodePos[b]) < MAX_DIST) {
          lp[li*6]=pos[a*3];lp[li*6+1]=pos[a*3+1];lp[li*6+2]=pos[a*3+2];
          lp[li*6+3]=pos[b*3];lp[li*6+4]=pos[b*3+1];lp[li*6+5]=pos[b*3+2];
          li++;
        }
      }
    }
    for (var k = li; k < MAX_LINES; k++) { lp[k*6]=lp[k*6+1]=lp[k*6+2]=lp[k*6+3]=lp[k*6+4]=lp[k*6+5]=0; }
    lGeom.attributes.position.needsUpdate = true;
    camera.position.x += (mouseX*15 - camera.position.x) * 0.025;
    camera.position.y += (-mouseY*10 - camera.position.y) * 0.025;
    camera.lookAt(scene.position);
    renderer.render(scene, camera);
  }
  animate();
})();
</script>

</body>
</html>
