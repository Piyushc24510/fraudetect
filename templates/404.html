<!DOCTYPE html>
<html data-theme="dark">
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#060910;--card:rgba(14,20,32,0.85);--border:rgba(0,255,180,0.12);
            --accent:#00ffb3;--accent2:#00cc8a;--accent-glow:rgba(0,255,179,0.25);
            --text:#e2edf7;--muted:#5a7a8a;--fake:#ff4466;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        #three-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
        body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
        body::after{content:'';position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015) 2px,rgba(0,0,0,0.015) 4px);pointer-events:none;}

        .error-container{
            position:relative;z-index:10;
            width:100%;max-width:580px;
            background:var(--card);
            border:1px solid var(--border);
            border-radius:20px;padding:60px 40px;
            backdrop-filter:blur(24px);
            box-shadow:0 0 0 1px rgba(0,255,179,0.04),0 25px 80px rgba(0,0,0,0.7),0 0 60px rgba(0,255,179,0.05);
            text-align:center;
            animation:cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}

        /* Corner decorations */
        .corner{position:absolute;width:16px;height:16px;border-color:rgba(0,255,179,0.4);border-style:solid;}
        .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:4px 0 0 0;}
        .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-radius:0 4px 0 0;}
        .corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-radius:0 0 0 4px;}
        .corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 4px 0;}

        /* 3D Logo */
        .logo-3d{width:64px;height:64px;margin:0 auto 20px;perspective:400px;cursor:pointer;}
        .logo-cube{width:100%;height:100%;transform-style:preserve-3d;animation:rotateCube 8s linear infinite;position:relative;}
        .logo-cube .face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid rgba(0,255,179,0.3);background:rgba(0,255,179,0.04);}
        .logo-cube .front{transform:translateZ(32px);}.logo-cube .back{transform:rotateY(180deg) translateZ(32px);}.logo-cube .left{transform:rotateY(-90deg) translateZ(32px);}.logo-cube .right{transform:rotateY(90deg) translateZ(32px);}.logo-cube .top{transform:rotateX(90deg) translateZ(32px);}.logo-cube .bot{transform:rotateX(-90deg) translateZ(32px);}
        @keyframes rotateCube{0%{transform:rotateX(0deg) rotateY(0deg);}100%{transform:rotateX(360deg) rotateY(360deg);}}

        .error-code{
            font-size:96px;font-weight:800;line-height:1;
            background:linear-gradient(135deg,var(--accent),#00a8ff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            text-shadow:none;margin-bottom:16px;
            font-family:'Space Mono',monospace;
            animation:pulse 2s ease-in-out infinite;
        }
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.8;}}

        h1{font-size:28px;font-weight:800;margin-bottom:14px;color:var(--text);}
        p{font-size:14px;color:var(--muted);margin-bottom:36px;line-height:1.7;font-family:'Space Mono',monospace;}

        .btn{
            display:inline-flex;align-items:center;gap:10px;
            padding:14px 36px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:#000;text-decoration:none;border-radius:10px;
            font-weight:800;font-size:13px;
            font-family:'Space Mono',monospace;
            text-transform:uppercase;letter-spacing:1.5px;
            transition:transform 0.2s,box-shadow 0.2s;
            position:relative;overflow:hidden;
        }
        .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);pointer-events:none;}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,255,179,0.4);}

        .links{margin-top:28px;padding-top:22px;border-top:1px solid var(--border);}
        .links a{color:rgba(0,255,179,0.6);text-decoration:none;margin:0 14px;font-size:13px;transition:color 0.2s;font-family:'Space Mono',monospace;}
        .links a:hover{color:var(--accent);}

        @media(max-width:480px){.error-container{padding:40px 24px;}.error-code{font-size:64px;}.h1{font-size:22px;}.links a{display:block;margin:10px 0;}}
    </style>
</head>
<body>
<canvas id="three-canvas"></canvas>

<div class="error-container">
    <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

    <div class="logo-3d">
        <div class="logo-cube">
            <div class="face front">🛡️</div><div class="face back">🔍</div>
            <div class="face left">⚡</div><div class="face right">🤖</div>
            <div class="face top">🎯</div><div class="face bot">✅</div>
        </div>
    </div>

    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>// The page you're looking for doesn't exist or has been moved.<br>Please check the URL or return to the dashboard.</p>

    <a href="/dashboard" class="btn"><i class="fa fa-home"></i> Go to Dashboard</a>

    <div class="links">
        <a href="/login"><i class="fa fa-sign-in-alt"></i> Login</a>
        <a href="/check"><i class="fa fa-search"></i> Check Review</a>
        <a href="/history"><i class="fa fa-clock"></i> History</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
    var canvas=document.getElementById('three-canvas'),renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    var scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);
    camera.position.z=40;
    function resize(){renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();}
    resize();window.addEventListener('resize',resize);
    var count=280,geo=new THREE.BufferGeometry(),positions=new Float32Array(count*3),colors=new Float32Array(count*3);
    for(var i=0;i<count;i++){positions[i*3]=(Math.random()-0.5)*120;positions[i*3+1]=(Math.random()-0.5)*80;positions[i*3+2]=(Math.random()-0.5)*60;var t=Math.random();if(t<0.6){colors[i*3]=0;colors[i*3+1]=0.8+Math.random()*0.2;colors[i*3+2]=0.5+Math.random()*0.5;}else{colors[i*3]=0.2+Math.random()*0.4;colors[i*3+1]=0.2+Math.random()*0.3;colors[i*3+2]=0.8+Math.random()*0.2;}}
    geo.setAttribute('position',new THREE.BufferAttribute(positions,3));geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
    var mat=new THREE.PointsMaterial({size:0.35,vertexColors:true,transparent:true,opacity:0.7,sizeAttenuation:true});
    scene.add(new THREE.Points(geo,mat));
    var cubes=[];
    for(var j=0;j<6;j++){var sz=3+Math.random()*5,cube=new THREE.Mesh(new THREE.BoxGeometry(sz,sz,sz),new THREE.MeshBasicMaterial({color:0x00ffb3,wireframe:true,transparent:true,opacity:0.08}));cube.position.set((Math.random()-0.5)*80,(Math.random()-0.5)*50,(Math.random()-0.5)*30);cube.userData={rx:(Math.random()-0.5)*0.01,ry:(Math.random()-0.5)*0.01,rz:(Math.random()-0.5)*0.005};scene.add(cube);cubes.push(cube);}
    for(var k=0;k<4;k++){var ico=new THREE.Mesh(new THREE.IcosahedronGeometry(2+Math.random()*3,0),new THREE.MeshBasicMaterial({color:0x6366f1,wireframe:true,transparent:true,opacity:0.07}));ico.position.set((Math.random()-0.5)*80,(Math.random()-0.5)*50,(Math.random()-0.5)*30);ico.userData={rx:(Math.random()-0.5)*0.012,ry:(Math.random()-0.5)*0.012};scene.add(ico);cubes.push(ico);}
    var mouse={x:0,y:0};document.addEventListener('mousemove',function(e){mouse.x=(e.clientX/window.innerWidth-0.5)*0.4;mouse.y=(e.clientY/window.innerHeight-0.5)*0.4;});
    var clock=new THREE.Clock();
    function animate(){requestAnimationFrame(animate);var t=clock.getElapsedTime();scene.children[0].rotation.y=t*0.03;scene.children[0].rotation.x=Math.sin(t*0.015)*0.1;cubes.forEach(function(c){c.rotation.x+=c.userData.rx;c.rotation.y+=c.userData.ry;if(c.userData.rz)c.rotation.z+=c.userData.rz;});camera.position.x+=(mouse.x*8-camera.position.x)*0.03;camera.position.y+=(-mouse.y*5-camera.position.y)*0.03;camera.lookAt(scene.position);renderer.render(scene,camera);}
    animate();
})();
</script>
</body>
</html>
