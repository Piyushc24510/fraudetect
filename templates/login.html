<!DOCTYPE html>
<html data-theme="dark">
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#060910;--card:rgba(14,20,32,0.85);--border:rgba(0,255,180,0.12);
            --accent:#00ffb3;--accent2:#00cc8a;--accent-glow:rgba(0,255,179,0.25);
            --text:#e2edf7;--muted:#5a7a8a;--fake:#ff4466;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        #three-canvas{position:fixed;inset:0;z-index:0;}
        body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
        body::after{content:'';position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015) 2px,rgba(0,0,0,0.015) 4px);pointer-events:none;}

        .login-wrapper{position:relative;z-index:10;width:100%;max-width:440px;padding:20px;}

        .login-container{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:20px;padding:44px 40px 36px;
            backdrop-filter:blur(24px);
            box-shadow:0 0 0 1px rgba(0,255,179,0.04),0 25px 80px rgba(0,0,0,0.7),0 0 60px rgba(0,255,179,0.05);
            animation:cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
            position:relative;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}

        /* Corner decorations */
        .corner{position:absolute;width:16px;height:16px;border-color:rgba(0,255,179,0.4);border-style:solid;}
        .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:4px 0 0 0;}
        .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-radius:0 4px 0 0;}
        .corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-radius:0 0 0 4px;}
        .corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 4px 0;}

        /* Logo */
        .logo{text-align:center;margin-bottom:32px;}
        .logo-3d{width:64px;height:64px;margin:0 auto 16px;perspective:400px;cursor:pointer;}
        .logo-cube{width:100%;height:100%;transform-style:preserve-3d;animation:rotateCube 8s linear infinite;position:relative;}
        .logo-cube .face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid rgba(0,255,179,0.3);background:rgba(0,255,179,0.04);}
        .logo-cube .front{transform:translateZ(32px);}.logo-cube .back{transform:rotateY(180deg) translateZ(32px);}.logo-cube .left{transform:rotateY(-90deg) translateZ(32px);}.logo-cube .right{transform:rotateY(90deg) translateZ(32px);}.logo-cube .top{transform:rotateX(90deg) translateZ(32px);}.logo-cube .bot{transform:rotateX(-90deg) translateZ(32px);}
        @keyframes rotateCube{0%{transform:rotateX(0deg) rotateY(0deg);}100%{transform:rotateX(360deg) rotateY(360deg);}}
        .logo h1{font-size:22px;color:var(--text);font-weight:800;text-transform:uppercase;letter-spacing:1px;}
        .logo .subtitle{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:4px;font-family:'Space Mono',monospace;}

        /* Status bar */
        .status-bar{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:26px;}
        .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
        .status-text{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,255,179,0.7);font-family:'Space Mono',monospace;}

        /* Alerts */
        .alert{padding:12px 16px;border-radius:10px;margin-bottom:22px;font-size:13px;display:flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;}
        .alert.error{background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.3);color:#ff8090;}
        .alert.success{background:rgba(0,255,179,0.07);border:1px solid rgba(0,255,179,0.25);color:var(--accent);}

        /* Form */
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:'Space Mono',monospace;}
        .input-wrapper{position:relative;}
        .input-wrapper .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(0,255,179,0.4);font-size:14px;pointer-events:none;transition:color 0.3s;}
        input[type="text"],input[type="password"]{width:100%;padding:13px 14px 13px 42px;background:rgba(0,255,179,0.02);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Space Mono',monospace;outline:none;transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;}
        input[type="text"]:focus,input[type="password"]:focus{border-color:var(--accent);background:rgba(0,255,179,0.03);box-shadow:0 0 0 3px var(--accent-glow);}
        input::placeholder{color:var(--muted);}

        /* Button */
        .btn-login{width:100%;padding:14px;margin-top:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#000;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.3s;}
        .btn-login::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.5s;}
        .btn-login:hover::before{left:100%;}
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,255,179,0.4);}
        .btn-login i{margin-right:8px;}

        /* Links */
        .links{text-align:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);}
        .links a{color:rgba(0,255,179,0.6);text-decoration:none;font-size:13px;transition:color 0.2s;font-family:'Space Mono',monospace;}
        .links a:hover{color:var(--accent);}

        /* Demo box */
        .demo-box{margin-top:20px;padding:14px 16px;background:rgba(0,255,179,0.03);border:1px solid rgba(0,255,179,0.12);border-radius:10px;}
        .demo-box .title{color:rgba(0,255,179,0.7);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;}
        .demo-box p{color:var(--muted);font-size:12px;margin:4px 0;font-family:'Space Mono',monospace;}
        .demo-box span{color:var(--accent);font-weight:700;}

        @media(max-width:480px){.login-container{padding:32px 24px 28px;}}
    </style>
</head>
<body>
<canvas id="three-canvas"></canvas>

<div class="login-wrapper">
    <div class="login-container">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

        <div class="logo">
            <div class="logo-3d"><div class="logo-cube"><div class="face front">🛡️</div><div class="face back">🔍</div><div class="face left">⚡</div><div class="face right">🤖</div><div class="face top">🎯</div><div class="face bot">✅</div></div></div>
            <h1>FraudDetect</h1>
            <div class="subtitle">Review Analysis System</div>
        </div>

        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">System Online</span>
        </div>

        {% if error %}
        <div class="alert error"><i class="fa fa-circle-exclamation"></i><span>{{ error }}</span></div>
        {% endif %}
        {% if success %}
        <div class="alert success"><i class="fa fa-circle-check"></i><span>{{ success }}</span></div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                    <i class="fa fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" placeholder="Enter your password" required>
                    <i class="fa fa-lock input-icon"></i>
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fa fa-bolt"></i>Login To Dashboard</button>
        </form>

        <div class="links"><a href="/register"><i class="fa fa-user-plus"></i> &nbsp;Create New Admin Account</a></div>

        <div class="demo-box">
            <div class="title"><i class="fa fa-circle-info"></i> Demo Credentials</div>
            <p>Username: <span>admin</span></p>
            <p>Password: <span>admin123</span></p>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
    var canvas=document.getElementById('three-canvas');
    var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    var scene=new THREE.Scene();
    var camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);
    camera.position.z=40;
    function resize(){renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();}
    resize();window.addEventListener('resize',resize);
    var count=280,geo=new THREE.BufferGeometry(),positions=new Float32Array(count*3),colors=new Float32Array(count*3);
    for(var i=0;i<count;i++){
        positions[i*3]=(Math.random()-0.5)*120;positions[i*3+1]=(Math.random()-0.5)*80;positions[i*3+2]=(Math.random()-0.5)*60;
        var t=Math.random();
        if(t<0.6){colors[i*3]=0;colors[i*3+1]=0.8+Math.random()*0.2;colors[i*3+2]=0.5+Math.random()*0.5;}
        else{colors[i*3]=0.2+Math.random()*0.4;colors[i*3+1]=0.2+Math.random()*0.3;colors[i*3+2]=0.8+Math.random()*0.2;}
    }
    geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
    var mat=new THREE.PointsMaterial({size:0.35,vertexColors:true,transparent:true,opacity:0.7,sizeAttenuation:true});
    scene.add(new THREE.Points(geo,mat));
    var cubes=[];
    for(var j=0;j<6;j++){var sz=3+Math.random()*5,cube=new THREE.Mesh(new THREE.BoxGeometry(sz,sz,sz),new THREE.MeshBasicMaterial({color:0x00ffb3,wireframe:true,transparent:true,opacity:0.08}));cube.position.set((Math.random()-0.5)*80,(Math.random()-0.5)*50,(Math.random()-0.5)*30);cube.userData={rx:(Math.random()-0.5)*0.01,ry:(Math.random()-0.5)*0.01,rz:(Math.random()-0.5)*0.005};scene.add(cube);cubes.push(cube);}
    for(var k=0;k<4;k++){var ico=new THREE.Mesh(new THREE.IcosahedronGeometry(2+Math.random()*3,0),new THREE.MeshBasicMaterial({color:0x6366f1,wireframe:true,transparent:true,opacity:0.07}));ico.position.set((Math.random()-0.5)*80,(Math.random()-0.5)*50,(Math.random()-0.5)*30);ico.userData={rx:(Math.random()-0.5)*0.012,ry:(Math.random()-0.5)*0.012};scene.add(ico);cubes.push(ico);}
    var mouse={x:0,y:0};
    document.addEventListener('mousemove',function(e){mouse.x=(e.clientX/window.innerWidth-0.5)*0.4;mouse.y=(e.clientY/window.innerHeight-0.5)*0.4;});
    var clock=new THREE.Clock();
    function animate(){requestAnimationFrame(animate);var t=clock.getElapsedTime();scene.children[0].rotation.y=t*0.03;scene.children[0].rotation.x=Math.sin(t*0.015)*0.1;cubes.forEach(function(c){c.rotation.x+=c.userData.rx;c.rotation.y+=c.userData.ry;if(c.userData.rz)c.rotation.z+=c.userData.rz;});camera.position.x+=(mouse.x*8-camera.position.x)*0.03;camera.position.y+=(-mouse.y*5-camera.position.y)*0.03;camera.lookAt(scene.position);renderer.render(scene,camera);}
    animate();
})();
</script>
</body>
</html>
